naftiko: 1.0.0-alpha2
info:
  label: Sportmonks Football API — Shared
  description: Shared per-API capability definition for the Sportmonks Football API covering the most-used read operations
    across livescores, fixtures, leagues, teams, players, standings, predictions, and odds.
  tags:
    - Sportmonks
    - Football
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      SPORTMONKS_API_TOKEN: SPORTMONKS_API_TOKEN
capability:
  consumes:
    - type: http
      namespace: sportmonks-football
      baseUri: https://api.sportmonks.com/v3/football
      description: Shared Sportmonks Football API surface for composition by higher-level workflow capabilities.
      resources:
        - name: livescores
          path: /livescores
          operations:
            - name: listLivescores
              method: GET
              description: List Livescores
        - name: livescores-inplay
          path: /livescores/inplay
          operations:
            - name: listInplayLivescores
              method: GET
              description: List In-Play Livescores
        - name: fixtures
          path: /fixtures
          operations:
            - name: listFixtures
              method: GET
              description: List Fixtures
        - name: fixture-by-id
          path: /fixtures/{id}
          operations:
            - name: getFixture
              method: GET
              description: Get Fixture By ID
        - name: fixtures-by-date
          path: /fixtures/date/{date}
          operations:
            - name: listFixturesByDate
              method: GET
              description: List Fixtures By Date
        - name: leagues
          path: /leagues
          operations:
            - name: listLeagues
              method: GET
              description: List Leagues
        - name: league-by-id
          path: /leagues/{id}
          operations:
            - name: getLeague
              method: GET
              description: Get League By ID
        - name: teams
          path: /teams
          operations:
            - name: listTeams
              method: GET
              description: List Teams
        - name: team-by-id
          path: /teams/{id}
          operations:
            - name: getTeam
              method: GET
              description: Get Team By ID
        - name: players
          path: /players
          operations:
            - name: listPlayers
              method: GET
              description: List Players
        - name: player-by-id
          path: /players/{id}
          operations:
            - name: getPlayer
              method: GET
              description: Get Player By ID
        - name: standings-by-season
          path: /standings/seasons/{seasonId}
          operations:
            - name: getStandingsBySeason
              method: GET
              description: Get Standings By Season
        - name: prediction-by-fixture
          path: /predictions/probabilities/fixtures/{fixtureId}
          operations:
            - name: getPredictionByFixture
              method: GET
              description: Get Prediction Probabilities For Fixture
        - name: pre-match-odds-by-fixture
          path: /odds/pre-match/fixtures/{fixtureId}
          operations:
            - name: getPreMatchOddsByFixture
              method: GET
              description: Get Pre-Match Odds For Fixture
        - name: inplay-odds-by-fixture
          path: /odds/inplay/fixtures/{fixtureId}
          operations:
            - name: getInplayOddsByFixture
              method: GET
              description: Get In-Play Odds For Fixture
      authentication:
        type: apikey
        key: api_token
        value: '{{env.SPORTMONKS_API_TOKEN}}'
        placement: query
