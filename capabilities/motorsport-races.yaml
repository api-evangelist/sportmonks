naftiko: 1.0.0-alpha2
info:
  label: Sportmonks Motorsport API — Races
  description: 'Sportmonks Motorsport API — Races. 2 operations. Lead operation: List Motorsport Races.'
  tags:
    - Sportmonks
    - Motorsport
    - Formula 1
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      SPORTMONKS_API_TOKEN: SPORTMONKS_API_TOKEN
capability:
  consumes:
    - type: http
      namespace: motorsport-races
      baseUri: https://api.sportmonks.com/v3/motorsport
      description: Sportmonks Motorsport Races business capability (F1 and broader motorsport).
      resources:
        - name: races
          path: /races
          operations:
            - name: listRaces
              method: GET
              description: List Motorsport Races
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: include
                  in: query
                  type: string
                  required: false
        - name: standings
          path: /drivers/standings
          operations:
            - name: getDriverStandings
              method: GET
              description: Get Driver Standings
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: season
                  in: query
                  type: integer
                  required: false
      authentication:
        type: apikey
        key: api_token
        value: '{{env.SPORTMONKS_API_TOKEN}}'
        placement: query
  exposes:
    - type: rest
      namespace: motorsport-races-rest
      port: 8080
      description: REST adapter for Sportmonks Motorsport Races.
      resources:
        - path: /v1/motorsport/races
          name: races
          description: REST surface for motorsport races.
          operations:
            - method: GET
              name: listRaces
              description: List Motorsport Races
              call: motorsport-races.listRaces
              with:
                include: rest.include
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/motorsport/drivers/standings
          name: driver-standings
          description: REST surface for driver standings.
          operations:
            - method: GET
              name: getDriverStandings
              description: Get Driver Standings
              call: motorsport-races.getDriverStandings
              with:
                season: rest.season
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: motorsport-races-mcp
      port: 9090
      transport: http
      description: MCP adapter for Sportmonks Motorsport Races.
      tools:
        - name: list-races
          description: List Motorsport Races
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: motorsport-races.listRaces
          with:
            include: tools.include
          outputParameters:
            - type: object
              mapping: $.
        - name: get-driver-standings
          description: Get Driver Standings
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: motorsport-races.getDriverStandings
          with:
            season: tools.season
          outputParameters:
            - type: object
              mapping: $.
