naftiko: 1.0.0-alpha2
info:
  label: Sportmonks Football API — Fixtures
  description: 'Sportmonks Football API — Fixtures. 3 operations. Lead operation: List Fixtures. Self-contained Naftiko capability
    covering one Sportmonks business surface.'
  tags:
    - Sportmonks
    - Football
    - Fixtures
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      SPORTMONKS_API_TOKEN: SPORTMONKS_API_TOKEN
capability:
  consumes:
    - type: http
      namespace: football-fixtures
      baseUri: https://api.sportmonks.com/v3/football
      description: Sportmonks Football Fixtures business capability.
      resources:
        - name: fixtures
          path: /fixtures
          operations:
            - name: listFixtures
              method: GET
              description: List Fixtures
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: include
                  in: query
                  type: string
                  required: false
                - name: filters
                  in: query
                  type: string
                  required: false
                - name: page
                  in: query
                  type: integer
                  required: false
        - name: fixture-by-id
          path: /fixtures/{id}
          operations:
            - name: getFixture
              method: GET
              description: Get Fixture By ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
        - name: fixtures-by-date
          path: /fixtures/date/{date}
          operations:
            - name: listFixturesByDate
              method: GET
              description: List Fixtures By Date
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: date
                  in: path
                  type: string
                  required: true
      authentication:
        type: apikey
        key: api_token
        value: '{{env.SPORTMONKS_API_TOKEN}}'
        placement: query
  exposes:
    - type: rest
      namespace: football-fixtures-rest
      port: 8080
      description: REST adapter for Sportmonks Football Fixtures.
      resources:
        - path: /v1/fixtures
          name: fixtures
          description: REST surface for fixtures.
          operations:
            - method: GET
              name: listFixtures
              description: List Fixtures
              call: football-fixtures.listFixtures
              with:
                include: rest.include
                filters: rest.filters
                page: rest.page
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/fixtures/{id}
          name: fixture-by-id
          description: REST surface for fixture by id.
          operations:
            - method: GET
              name: getFixture
              description: Get Fixture By ID
              call: football-fixtures.getFixture
              with:
                id: rest.id
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/fixtures/date/{date}
          name: fixtures-by-date
          description: REST surface for fixtures by date.
          operations:
            - method: GET
              name: listFixturesByDate
              description: List Fixtures By Date
              call: football-fixtures.listFixturesByDate
              with:
                date: rest.date
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: football-fixtures-mcp
      port: 9090
      transport: http
      description: MCP adapter for Sportmonks Football Fixtures.
      tools:
        - name: list-fixtures
          description: List Fixtures
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: football-fixtures.listFixtures
          with:
            include: tools.include
            filters: tools.filters
            page: tools.page
          outputParameters:
            - type: object
              mapping: $.
        - name: get-fixture
          description: Get Fixture By ID
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: football-fixtures.getFixture
          with:
            id: tools.id
          outputParameters:
            - type: object
              mapping: $.
        - name: list-fixtures-by-date
          description: List Fixtures By Date
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: football-fixtures.listFixturesByDate
          with:
            date: tools.date
          outputParameters:
            - type: object
              mapping: $.
