aid: sportmonks
name: Sportmonks
description: >-
  Sportmonks is a Dutch sports data provider (Deventer, Netherlands) delivering developer-friendly REST APIs for
  football/soccer, cricket, and motorsport (Formula 1). The platform serves 30,000+ active users and 20,000+ developers
  building livescore portals, fantasy games, betting platforms, sports media products, and analytics tools. Sportmonks
  emphasizes fast real-time updates (<15 seconds), 99.9% uptime, transparent per-league pricing, and a forever-free tier
  covering selected leagues. APIs use JSON over REST with API token authentication via either an Authorization header or
  an `api_token` query parameter, and support fine-grained response shaping through filters, includes, and field
  selection.
