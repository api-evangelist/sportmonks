apis:
  - aid: sportmonks:football-api
    name: Sportmonks Football API
    description: >-
      REST API for soccer/football data covering 2,500+ leagues worldwide. Provides fixtures, livescores, schedules,
      standings, statistics, predictions, odds, teams, players, coaches, referees, venues, transfers, topscorers, and
      news. Supports request optimization via filters, includes, and field selection. Pricing tiers gate the number of
      leagues accessible, with a forever-free plan covering the Danish Superliga and Scottish Premiership.
    humanURL: https://docs.sportmonks.com/football
    baseURL: https://api.sportmonks.com/v3/football
    tags:
      - Football
      - Livescores
      - Odds
      - Predictions
      - Real-Time
      - Soccer
      - Statistics
    properties:
      - type: Documentation
        url: https://docs.sportmonks.com/football
