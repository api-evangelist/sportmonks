      - type: Examples
        url: examples/sportmonks-livescore-example.json
  - aid: sportmonks:cricket-api
    name: Sportmonks Cricket API
    description: >-
      REST API for cricket data covering 130+ leagues including IPL, international fixtures, and T20 competitions.
      Provides ball-by-ball commentary, live scoreboards, fixtures, teams, players, venues, officials, seasons, leagues,
      and detailed player statistics. A Postman collection is published at cricket-postman.sportmonks.com.
    humanURL: https://docs.sportmonks.com/cricket
    baseURL: https://cricket.sportmonks.com/api/v2.0
    tags:
      - Ball-By-Ball
      - Cricket
      - Livescores
      - Real-Time
      - Sports Data
      - Statistics
    properties:
      - type: Documentation
        url: https://docs.sportmonks.com/cricket
      - type: GettingStarted
        url: https://docs.sportmonks.com/cricket/welcome/introduction
      - type: PostmanCollection
        url: https://cricket-postman.sportmonks.com/
  - aid: sportmonks:motorsport-api
    name: Sportmonks Motorsport API
    description: >-
      REST API for motorsport data including Formula 1 race results, qualifying, driver and constructor standings, lap
      times, season schedules, and circuit information. Replaces the deprecated Formula One v1 API with a v3
      motorsport-wide surface area.
    humanURL: https://docs.sportmonks.com/v3/motorsport-api/
    baseURL: https://api.sportmonks.com/v3/motorsport
    tags:
      - Drivers
      - Formula 1
      - Motorsport
      - Race Results
      - Real-Time
      - Standings
    properties:
      - type: Documentation
        url: https://docs.sportmonks.com/v3/motorsport-api/
      - type: GettingStarted
        url: https://docs.sportmonks.com/v3/motorsport-api/welcome/introduction
  - aid: sportmonks:football-widgets
    name: Sportmonks Football Widgets
    description: >-
      Embeddable JavaScript widgets that render Sportmonks football data as ready-to-use UI components for livescores,
      league tables, fixtures, and match details. Designed for media sites and football publishers who want to drop in
      branded visualizations without building front-end components.
    humanURL: https://www.sportmonks.com/football-widgets/
    tags:
      - Embeddable
      - Football
      - Widgets
    properties:
      - type: Documentation
        url: https://docs.sportmonks.com/football/widgets
